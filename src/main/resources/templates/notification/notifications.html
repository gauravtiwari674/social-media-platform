<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">

    <h2>Notifications</h2>
    <div th:if="${notifications.empty}">
        <p class="text-muted">No notifications yet.</p>
    </div>
    <ul class="list-group" th:unless="${notifications.empty}">
        <li class="list-group-item d-flex justify-content-between align-items-center"
            th:each="n : ${notifications}">
            <div>
                <p class="mb-1" th:text="${n.content}"></p>
                <small class="text-muted" th:text="${n.timestamp}"></small>
            </div>
            <button class="btn btn-sm btn-danger"
                    th:onclick="'deleteNotification(' + ${n.notificationID} + ')'">
                Delete
            </button>
        </li>
    </ul>

</div>
<script>
function deleteNotification(id) {
    fetch('/notifications/' + id, { method: 'DELETE' })
        .then(() => location.reload());
}
</script>
</body>
</html>
