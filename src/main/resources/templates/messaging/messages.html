<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Messages</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-4">

    <h2>Conversation</h2>
    <div class="border rounded p-3 mb-4" style="max-height:400px; overflow-y:auto;">
        <div th:if="${messages == null or messages.empty}">
            <p class="text-muted">No messages yet. Start the conversation!</p>
        </div>
        <div th:each="m : ${messages}" class="mb-3">
            <div th:if="${m.senderID == userID}" class="text-end">
                <span class="badge bg-primary p-2" th:text="${m.message_text}"></span>
                <br/>
                <small class="text-muted" th:text="${m.timestamp}"></small>
            </div>
            <div th:unless="${m.senderID == userID}" class="text-start">
                <span class="badge bg-secondary p-2" th:text="${m.message_text}"></span>
                <br/>
                <small class="text-muted" th:text="${m.timestamp}"></small>
            </div>
        </div>
    </div>

    <h5>Send a Message</h5>
    <form th:action="@{/messages/send}" method="post">
        <input type="hidden" name="senderID" th:value="${userID}"/>
        <input type="hidden" name="receiverID" th:value="${otherID}"/>
        <div class="input-group">
            <input type="text" name="message_text"
                   class="form-control" placeholder="Type a message..."/>
            <button class="btn btn-primary" type="submit">Send</button>
        </div>
    </form>

</div>
</body>
</html>
