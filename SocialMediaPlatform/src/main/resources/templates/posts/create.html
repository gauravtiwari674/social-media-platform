<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Post</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            margin-left: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Post</h2>

        <form th:action="@{/posts/create}" th:object="${postDTO}" method="post">
            <div>
                <textarea th:field="*{content}" placeholder="Write your post here..."></textarea>
                <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>

            <button type="submit">Post</button>
            <a th:href="@{/feed}">Back to Feed</a>
        </form>
    </div>
</body>
</html>
