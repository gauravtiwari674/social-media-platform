<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 70%;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .top-bar {
            text-align: right;
            margin-bottom: 20px;
        }

        .top-bar a {
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .post-card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .username {
            font-weight: bold;
            color: #007bff;
        }

        .timestamp {
            color: gray;
            font-size: 14px;
        }

        .content {
            font-size: 16px;
            margin: 10px 0;
            color: #333;
        }

        .actions a {
            text-decoration: none;
            margin-right: 10px;
            color: #007bff;
            font-weight: bold;
        }

        .actions a.delete {
            color: red;
        }

        .no-posts {
            text-align: center;
            color: gray;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Social Media Feed</h1>

        <div class="top-bar">
            <a th:href="@{/posts/create}">Create Post</a>
        </div>

        <div th:if="${posts != null and !posts.isEmpty()}">
            <div class="post-card" th:each="post : ${posts}">
                <div class="post-header">
                    <span class="username" th:text="${post.username}">Username</span>
                    <span class="timestamp"
                          th:text="${#temporals.format(post.timestamp, 'dd-MM-yyyy HH:mm')}">
                        Time
                    </span>
                </div>

                <div class="content" th:text="${post.content}">
                    Post content
                </div>

                <div class="actions">
                    <a th:href="@{'/posts/' + ${post.postId}}">View</a>
                    <a th:href="@{'/posts/edit/' + ${post.postId}}">Edit</a>
                    <a th:href="@{'/posts/delete/' + ${post.postId}}"
                       class="delete"
                       onclick="return confirm('Are you sure you want to delete this post?')">
                        Delete
                    </a>
                </div>
            </div>
        </div>

        <div class="no-posts" th:if="${posts == null or posts.isEmpty()}">
            No posts available.
        </div>
    </div>
</body>
</html>
