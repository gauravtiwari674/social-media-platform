<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        .username {
            font-weight: bold;
            color: #007bff;
        }

        .timestamp {
            color: gray;
            font-size: 14px;
        }

        .content {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        .actions {
            margin-top: 20px;
        }

        .actions a {
            margin-right: 10px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .actions a.delete {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Post Details</h2>

        <p>
            <span class="username" th:text="${post.username}">Username</span>
        </p>

        <p class="timestamp"
           th:text="${#temporals.format(post.timestamp, 'dd-MM-yyyy HH:mm')}">
            Timestamp
        </p>

        <div class="content" th:text="${post.content}">
            Post content
        </div>

        <div class="actions">
            <a th:href="@{'/posts/edit/' + ${post.postId}}">Edit</a>
            <a th:href="@{'/posts/delete/' + ${post.postId}}"
               class="delete"
               onclick="return confirm('Are you sure you want to delete this post?')">
                Delete
            </a>
            <a th:href="@{/feed}">Back to Feed</a>
        </div>
    </div>
</body>
</html>
